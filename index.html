<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulug'bek Pay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f121d;
            --card-bg: #1a1e2e;
            --gold: #ffd700;
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --green: #3fb950;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding-bottom: 80px;
        }
        .header {
            text-align: center;
            padding: 25px 10px;
        }
        .header h1 {
            font-size: 24px;
            margin: 0;
        }
        .header .name { color: var(--gold); } /* ISMINGIZ OLTIN RANGDA */
        .header .pay { color: #58a6ff; }

        .section-label {
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        .section-label span { color: var(--neon-blue); margin-right: 5px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0 10px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 8px;
            text-align: center;
            border: 2px solid var(--neon-blue); /* Neon chiziq */
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 50%; /* Dumaloq rasmlar */
            object-fit: cover;
            margin-bottom: 5px;
        }

        .price { color: var(--green); font-weight: bold; font-size: 11px; }
        .title { font-size: 12px; margin: 5px 0; }

        .nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #161b22;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #30363d;
        }
        .nav-item { color: #8b949e; text-decoration: none; font-size: 11px; text-align: center; cursor: pointer; }
        .active { color: var(--neon-blue); }
        .footer-bot { text-align: center; color: #555; font-size: 10px; padding: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1><span class="name">Ulug'bek</span> <span class="pay">Pay</span></h1>
</div>

<div class="section-label"><div><span>|</span> O'yinlar</div> <small style="color:#58a6ff">Hammasi ></small></div>
<div class="grid">
    <div class="card" onclick="sendOrder('Brawl Stars', '120,000 UZS')">
        <img src="image_a27045.jpg"> <div class="title">Brawl Stars</div>
        <div class="price">120,000 UZS</div>
    </div>
    <div class="card" onclick="sendOrder('Standoff 2', '150,000 UZS')">
        <img src="image_a273cb.jpg">
        <div class="title">Standoff 2</div>
        <div class="price">150,000 UZS</div>
    </div>
    <div class="card" onclick="sendOrder('PUBG Mobile', '180,000 UZS')">
        <img src="image_a277ca.jpg">
        <div class="title">PUBG Mobile</div>
        <div class="price">180,000 UZS</div>
    </div>
</div>

<div class="section-label"><div><span>|</span> Ilovalar & Servislar</div> <small style="color:#58a6ff">Hammasi ></small></div>
<div class="grid">
    <div class="card" onclick="sendOrder('YouTube Premium', '45,000 UZS')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/dd/YouTube_Premium_logo.svg">
        <div class="title">YouTube</div>
        <div class="price">45,000 UZS</div>
    </div>
    <div class="card" onclick="sendOrder('ChatGPT Plus', '260,000 UZS')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg">
        <div class="title">ChatGPT</div>
        <div class="price">260,000 UZS</div>
    </div>
    <div class="card" onclick="sendOrder('Netflix', '110,000 UZS')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
        <div class="title">Netflix</div>
        <div class="price">110,000 UZS</div>
    </div>
</div>

<div class="footer-bot">@ai_p6y_bot</div>

<div class="nav">
    <div class="nav-item active">🏠<br>Do'kon</div>
    <div class="nav-item" onclick="navTo('bonus')">⭐<br>Bonus</div>
    <div class="nav-item" onclick="navTo('chat')">🎧<br>Yordam</div>
    <div class="nav-item" onclick="exitApp()">🚪<br>Chiqish</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function sendOrder(item, price) {
        tg.sendData(`Buyurtma: ${item}\nNarxi: ${price}`);
    }

    function navTo(page) {
        if (page === 'chat') tg.openTelegramLink("https://t.me/urinbaev_1804");
        else alert(page + " bo'limi tez orada ishga tushadi!");
    }

    function exitApp() { tg.close(); }
</script>
</body>
</html>
