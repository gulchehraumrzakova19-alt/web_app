<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ulug'bek Pay PRO</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body{margin:0;font-family:sans-serif;background:#0f121d;color:white;padding-bottom:90px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px}
.card{background:#1a1e2e;border-radius:15px;padding:10px;text-align:center;border:2px solid #00d2ff}
.card img{width:80px;height:80px;border-radius:50%;object-fit:cover}
.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#111;padding:10px 0}
.nav-item{text-align:center;font-size:12px;color:#aaa}
.nav-item i{display:block;font-size:20px}
.active{color:#00d2ff}
input{width:90%;margin:5px auto;display:block;padding:8px;border-radius:8px;border:none}
button{width:90%;margin:10px auto;display:block;padding:10px;border:none;border-radius:10px;background:#00d2ff;color:black;font-weight:bold}
</style>
</head>

<body>

<h2 style="text-align:center">Ulug'bek Pay PRO</h2>

<input id="email" placeholder="Email">
<input id="scid" placeholder="ID">

<h3 style="padding-left:10px">O'yinlar</h3>
<div class="grid">

<div class="card" onclick="addToCart('Brawl Stars',120000)">
<img src="https://upload.wikimedia.org/wikipedia/en/6/6f/Brawl_Stars_icon.png">
<div>Brawl Stars</div>
</div>

<div class="card" onclick="addToCart('PUBG',180000)">
<img src="https://upload.wikimedia.org/wikipedia/en/0/03/PUBG_Mobile_logo.png">
<div>PUBG</div>
</div>

<div class="card" onclick="addToCart('Minecraft',220000)">
<img src="https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png">
<div>Minecraft</div>
</div>

</div>

<h3 style="padding-left:10px">Savatcha</h3>
<div id="cart"></div>

<button onclick="checkout()">💳 To'lov qilish</button>

<div class="nav">
<div class="nav-item active"><i class="fas fa-home"></i>Home</div>
<div class="nav-item"><i class="fas fa-shopping-cart"></i>Cart</div>
<div class="nav-item"><i class="fas fa-user"></i>Admin</div>
<div class="nav-item" onclick="tg.close()"><i class="fas fa-sign-out"></i>Exit</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
if(tg.expand) tg.expand();

let cart = [];

// 🛒 qo‘shish
function addToCart(item, price){
    cart.push({
        item: String(item),
        price: Number(price)
    });

    tg.showAlert(item + " qo'shildi");
    renderCart();
}

// 🧾 ko‘rsatish
function renderCart(){
    let html = "";
    cart.forEach((c,i)=>{
        html += `
        <div style="padding:5px">
            ${c.item} - ${c.price} 
            <button onclick="removeItem(${i})">❌</button>
        </div>`;
    });
    document.getElementById("cart").innerHTML = html;
}

// ❌ o‘chirish
function removeItem(i){
    cart.splice(i,1);
    renderCart();
}

// 💳 checkout
function checkout(){
    if(cart.length === 0){
        tg.showAlert("Savatcha bo'sh");
        return;
    }

    const data = {
        cart: cart,
        email: document.getElementById("email").value || "",
        supercell_id: document.getElementById("scid").value || ""
    };

    console.log("YUBORILDI:", data);

    tg.sendData(JSON.stringify(data));

    tg.showAlert("So'rov yuborildi ✅");

    cart = [];
    renderCart();
}
</script>

<div id="loader">
  <div class="spinner"></div>
  <p>Yuklanmoqda...</p>
</div>

</body>
</html>
